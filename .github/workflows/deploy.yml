name: Deploy to Production

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'static/planner-ui/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'static/planner-ui/package.json'
      - 'static/planner-ui/package-lock.json'
      - 'manifest.yml'
jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            static/planner-ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: static/planner-ui
        run: npm ci

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        working-directory: static/planner-ui
        run: npm test

      - name: Build frontend
        working-directory: static/planner-ui
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            static/planner-ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: static/planner-ui
        run: npm ci

      - name: Build frontend
        working-directory: static/planner-ui
        run: npm run build

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Deploy to production
        run: |
          forge settings set usage-analytics false
          forge deploy -e production --non-interactive
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
