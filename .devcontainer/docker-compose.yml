services:
  dev:
    build: .
    image: neblar/jira-planner:v1
    # We do not want to recreate the container or have multiple instances of it running ever
    container_name: neblar-jira-planner
    volumes:
      # Mount SSH Keys as readonly
      - ~/.ssh:/root/.ssh:ro
      # Mount gitconfig
      - ~/.gitconfig:/root/.gitconfig:ro
      # Mount working folder
      - ../:/home/workspace
    environment:
      FORGE_EMAIL: ${FORGE_EMAIL}
      FORGE_API_TOKEN: ${FORGE_API_TOKEN}
    # The following commands ensure that the container stays active
    entrypoint: bash
    stdin_open: true
    tty: true