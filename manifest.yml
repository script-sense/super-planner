modules:
  jira:fullPage:
    - key: super-planner-full-page
      resource: main
      resolver:
        function: resolver
      title: Super Planner
      routePrefix: super-planner
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/planner-ui/build
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/d101d126-3681-4139-9844-01c3456eb1fa
permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - read:sprint:jira-software
    - read:board-scope:jira-software
    - read:issue-details:jira
    - read:project:jira
    - write:jira-work
    - write:sprint:jira-software
    - write:board-scope:jira-software
    - manage:jira-configuration
    - write:issue:jira-software
