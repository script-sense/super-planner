modules:
  jira:fullPage:
    - key: super-planner-full-page
      resource: main
      resolver:
        function: resolver
      title: Super Planner
      routePrefix: super-planner
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/planner-ui/build
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/fa84de8d-c339-4d3c-9823-50ccb2c19426
permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - read:sprint:jira-software
    - read:board-scope:jira-software
    - read:issue-details:jira
    - read:project:jira
    - write:jira-work